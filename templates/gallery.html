{% extends "base.html" %}
{% block content %}

<h2 class="text-center mb-3">Currency Notes Gallery</h2>

<p class="text-muted text-center mb-4">
    Sample currency note images for visual reference.
</p>

<div class="row">
    {% for image in images %}
    <div class="col-md-3 col-sm-6 mb-4">
        <div class="card shadow-sm">
            <img src="{{ url_for('static', filename='images/gallery/' ~ image) }}"
                 class="card-img-top img-fluid"
                 style="height:200px; object-fit:cover;">
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
