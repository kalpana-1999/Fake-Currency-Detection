{% extends "base.html" %}
{% block content %}

<h3 class="mb-4">Currency Check History</h3>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr>
            <th>Image</th>
            <th>Result</th>
            <th>Confidence</th>
            <th>Date & Time</th>
        </tr>
    </thead>
    <tbody>
        {% for item in history %}
        <tr>
            <td>
                <img src="{{ url_for('static', filename='uploads/' ~ item.image) }}" width="100">
            </td>
            <td>
                {% if item.result == "Genuine Currency" %}
                <span class="badge bg-success">Genuine</span>
                {% else %}
                <span class="badge bg-danger">Fake</span>
                {% endif %}
            </td>
            <td>{{ item.confidence }}%</td>
            <td>{{ item.time }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
